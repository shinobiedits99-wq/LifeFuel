<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeFule AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1 class="logo">LifeFule AI</h1>

<div id="auth-container" class="glass-card">

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="login-btn">Login</button>

<button id="signup-btn" class="secondary-btn">Sign Up</button>

</div>


<div id="app-content">

<nav>

<button id="logout-btn">Logout</button>

</nav>

<div class="glass-card">

<h3>Add Meal</h3>

<input type="text" id="food-name" placeholder="Food Name">

<input type="number" id="calories" placeholder="Calories">

<button id="add-btn">Save Meal</button>

</div>


<div class="glass-card">

<h3>Your Meals</h3>

<div id="meal-list"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
