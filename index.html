<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFuel AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-container" class="glass-card">
        <h2>Login to LifeFuel</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="signup-btn" style="background:transparent; border:1px solid #00ff88;">Sign Up</button>
    </div>

    <div id="app-content" style="display: none;">
        <nav><button id="logout-btn">Logout</button></nav>
        <div class="glass-card">
            <h3>Log a Meal</h3>
            <input type="text" id="food-name" placeholder="Food Name">
            <input type="number" id="calories" placeholder="Calories">
            <button id="add-btn">Save Meal</button>
        </div>
        <div id="meal-list" class="glass-card"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
